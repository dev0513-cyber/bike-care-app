server {
    listen 80;
    server_name _;

    # Set root to where React build files are
    root /usr/share/nginx/html;
    index index.html index.htm;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss;

    # Main location - serve React app
    location / {
        # Try to serve file directly, fallback to index.html, then 404
        try_files $uri /index.html =404;
        
        # Headers
        add_header Cache-Control "public, max-age=0, must-revalidate, no-cache, no-store";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Static files - use browser cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # index.html - never cache
    location = /index.html {
        add_header Cache-Control "public, max-age=0, must-revalidate, no-cache, no-store";
    }

    # Deny access to dotfiles
    location ~ /\. {
        deny all;
    }
}
